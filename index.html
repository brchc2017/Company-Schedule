<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>BRCHC 영업본부 캘린더</title>

  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <style>
    /* 공지사항 스타일 */
    #notice {
      background-color: #f5f7fa;
      border: 1px solid #dcdfe6;
      padding: 16px 20px;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    #notice h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    #notice ul {
      margin: 0;
      padding-left: 20px;
    }

    #notice li {
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

  <h2>📅 BRCHC 영업본부 공유 일정</h2>

  <!-- ✅ 공지사항 영역 -->
  <div id="notice">
    <h3>📢 공지사항</h3>
    <ul>      
      <li>3/3(화) 3월 화상교육 진행</li>
      <li>3/11(수) 3월 팀장회의 진행</li>
      <li>3/17(화) 3월 전반주의 60% 마감 </li>
    </ul>
  </div>

  <!-- 캘린더 -->
  <div id="calendar"></div>

  <!-- FullCalendar Core -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <!-- Google Calendar Plugin -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@6.1.8/index.global.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var calendarEl = document.getElementById('calendar');

      var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'ko',

        googleCalendarApiKey: 'AIzaSyDdoymDkoymoi-lvka14ed8CrhDusoWn-A',

        events: {
          googleCalendarId: '2f2a457e4d382e65a7854e3c7d58b429279b8b8b2b3b636f88c080ae162ebcdf@group.calendar.google.com'
        }
      });

      calendar.render();
    });
  </script>

</body>
</html>
